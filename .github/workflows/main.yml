name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Check project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Checking gradlew ==="
          if [ -f "gradlew" ]; then
            echo "gradlew FOUND"
          else
            echo "gradlew NOT FOUND - please push Android project first"
            exit 0
          fi
